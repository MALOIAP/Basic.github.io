<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seja Alguem</title>

    <!-- Script do Google AdSense -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('v1016-b-09.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.85);
            max-width: 850px;
            width: 95%;
            margin: 40px 0;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
        }

        h1 { color: #28a745; margin-bottom: 20px; }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            border: 3px solid #28a745;
            margin-bottom: 30px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .texto-conteudo {
            text-align: left;
            line-height: 1.8;
        }

        .aula-box {
            background: rgba(40, 167, 69, 0.1);
            border-left: 5px solid #28a745;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>APRENDA O BÁSICO!</h1>

        <div class="video-wrapper">
            <!-- AGORA O LINK ESTÁ COMPLETO E COM O EMBED CORRETO -->
            <iframe src="https://youtube.com" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>

        <div class="texto-conteudo">

            <p>1- Aprender programação é sobre ganhar poder de criar soluções e projetos do zero.</p>
            <p>2- Desenvolva disciplina e criatividade transformando ideias simples em algo real.</p>
        </div>
    </div>

</body>
</html>
